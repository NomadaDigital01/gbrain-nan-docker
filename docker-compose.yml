services:
  gbrain:
    build: .
    expose:
      - "80"
    environment:
      - NAN_API_KEY=${NAN_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - PUBLIC_URL=${PUBLIC_URL:-}
    volumes:
      - gbrain-data:/data
    mem_limit: 1g
    mem_reservation: 512m
    restart: on-failure:3

volumes:
  gbrain-data:
