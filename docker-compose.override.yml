services:
  gbrain:
    ports:
      - "80:80"
    command: ["gbrain", "serve", "--http", "--enable-dcr", "--bind", "0.0.0.0"]
    environment:
      - NAN_API_KEY=${NAN_API_KEY}
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      - OPENAI_BASE_URL=http://localhost:4000/v1
      - LLAMA_SERVER_RERANKER_API_KEY=${NAN_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - PUBLIC_URL=${PUBLIC_URL:-}
      - GBRAIN_HTTP_CORS_ORIGIN=*
    volumes:
      - gbrain-data:/data
      - /opt/gbrain/vault-mirror:/vault:ro
