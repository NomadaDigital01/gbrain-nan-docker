# Frontal: gbrain serve --http en :3131
server {
    listen 80 default_server;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3131;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
    }
}

# Anthropic shim: reescribe /messages y /v1/v1/messages a /v1/messages (lo que hace el bun shim)
# Reemplazo nativo en nginx → ahorra ~150MB del bun extra
server {
    listen 4001;
    server_name _;

    location = /messages {
        rewrite ^.*$ /v1/messages break;
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
    }
    location = /v1/v1/messages {
        rewrite ^.*$ /v1/messages break;
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
    }
    location = /messages/count_tokens {
        rewrite ^.*$ /v1/messages/count_tokens break;
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
    }
    location = /v1/v1/messages/count_tokens {
        rewrite ^.*$ /v1/messages/count_tokens break;
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
    }
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
    }
}
